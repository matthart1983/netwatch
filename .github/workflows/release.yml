name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: netwatch-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: netwatch-linux-aarch64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: netwatch-linux-x86_64-static
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: netwatch-linux-aarch64-static
          - target: x86_64-apple-darwin
            os: macos-latest
            name: netwatch-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: netwatch-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: netwatch-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap (Linux x86_64 glibc)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install cross-compilation dependencies (Linux aarch64 glibc)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          if ! grep -q '^Architectures: amd64$' /etc/apt/sources.list.d/ubuntu.sources; then
            sudo sed -i '/^Signed-By:/i Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources >/dev/null
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libpcap0.8-dev:arm64 pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "LIBPCAP_LIBDIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Install musl toolchain (Linux musl x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          echo "PCAP_CC=musl-gcc" >> $GITHUB_ENV
          echo "PCAP_HOST=x86_64-linux-musl" >> $GITHUB_ENV

      - name: Install musl cross toolchain (Linux musl aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          wget -q https://musl.cc/aarch64-linux-musl-cross.tgz
          sudo tar xzf aarch64-linux-musl-cross.tgz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "PCAP_CC=aarch64-linux-musl-gcc" >> $GITHUB_ENV
          echo "PCAP_HOST=aarch64-linux-musl" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> $GITHUB_ENV

      - name: Build static libpcap (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          LIBPCAP_VERSION=1.10.5
          PREFIX="${RUNNER_TEMP}/pcap-${{ matrix.target }}"
          wget -q https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz
          tar xzf libpcap-${LIBPCAP_VERSION}.tar.gz
          cd libpcap-${LIBPCAP_VERSION}
          CC="$PCAP_CC" ./configure \
            --host="$PCAP_HOST" \
            --prefix="$PREFIX" \
            --with-pcap=linux \
            --disable-shared \
            --disable-dbus \
            --disable-bluetooth \
            --disable-rdma \
            --disable-usb \
            --without-libnl
          make -j"$(nproc)"
          make install
          echo "LIBPCAP_LIBDIR=${PREFIX}/lib" >> $GITHUB_ENV
          echo "LIBPCAP_VER=${LIBPCAP_VERSION}" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALL_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install npcap SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath npcap-sdk
          echo "LIB=${{ github.workspace }}\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/netwatch ${{ matrix.name }}
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/netwatch.exe ${{ matrix.name }}
          Compress-Archive -Path ${{ matrix.name }} -DestinationPath ${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
