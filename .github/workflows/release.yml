name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: netwatch-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: netwatch-linux-aarch64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: netwatch-linux-x86_64-static
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: netwatch-linux-aarch64-static
          - target: x86_64-apple-darwin
            os: macos-latest
            name: netwatch-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: netwatch-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: netwatch-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap (Linux x86_64 glibc)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install cross-compilation dependencies (Linux aarch64 glibc)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          if ! grep -q '^Architectures: amd64$' /etc/apt/sources.list.d/ubuntu.sources; then
            sudo sed -i '/^Signed-By:/i Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources >/dev/null
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libpcap0.8-dev:arm64 pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "LIBPCAP_LIBDIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Install zig + cargo-zigbuild (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          python3 -m pip install --user ziglang cargo-zigbuild
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)  TRIPLE=x86_64-linux-musl ;;
            aarch64-unknown-linux-musl) TRIPLE=aarch64-linux-musl ;;
          esac
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/${TRIPLE}-gcc" <<EOF
          #!/bin/sh
          exec python3 -m ziglang cc -target ${TRIPLE} "\$@"
          EOF
          cat > "$HOME/.local/bin/${TRIPLE}-ar" <<EOF
          #!/bin/sh
          exec python3 -m ziglang ar "\$@"
          EOF
          cat > "$HOME/.local/bin/${TRIPLE}-ranlib" <<EOF
          #!/bin/sh
          exec python3 -m ziglang ranlib "\$@"
          EOF
          chmod +x "$HOME/.local/bin/${TRIPLE}"-*
          echo "PCAP_CC=${TRIPLE}-gcc" >> $GITHUB_ENV
          echo "PCAP_HOST=${TRIPLE}" >> $GITHUB_ENV

      - name: Build static libpcap (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          LIBPCAP_VERSION=1.10.5
          PREFIX="${RUNNER_TEMP}/pcap-${{ matrix.target }}"
          wget -q https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz
          tar xzf libpcap-${LIBPCAP_VERSION}.tar.gz
          cd libpcap-${LIBPCAP_VERSION}
          CC="$PCAP_CC" ./configure \
            --host="$PCAP_HOST" \
            --prefix="$PREFIX" \
            --with-pcap=linux \
            --disable-shared \
            --disable-dbus \
            --disable-bluetooth \
            --disable-rdma \
            --disable-usb \
            --without-libnl
          make -j"$(nproc)"
          make install
          echo "LIBPCAP_LIBDIR=${PREFIX}/lib" >> $GITHUB_ENV
          echo "LIBPCAP_VER=${LIBPCAP_VERSION}" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALL_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install npcap SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath npcap-sdk
          echo "LIB=${{ github.workspace }}\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"linux-musl" ]]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/netwatch ${{ matrix.name }}
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/netwatch.exe ${{ matrix.name }}
          Compress-Archive -Path ${{ matrix.name }} -DestinationPath ${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    needs: release
    # Skip homebrew formula update for pre-release tags (e.g. v0.14.0-rc.1).
    # Brew has no pre-release concept, so any formula push reaches every
    # `brew upgrade` user. crates.io still publishes — pre-release versions
    # there are opt-in via `cargo install --version`.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Compute sha256 for each release asset
        id: sha
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          for asset in \
            netwatch-macos-x86_64.tar.gz \
            netwatch-macos-aarch64.tar.gz \
            netwatch-linux-x86_64-static.tar.gz \
            netwatch-linux-aarch64-static.tar.gz
          do
            url="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${asset}"
            for i in 1 2 3 4 5; do
              if curl -sLf "${url}" -o "${asset}"; then break; fi
              echo "Download ${asset} attempt $i failed, retrying..."; sleep 5
            done
            test -s "${asset}" || { echo "Failed to download ${asset}"; exit 1; }
            hash=$(sha256sum "${asset}" | awk '{print $1}')
            key=$(echo "${asset}" | sed -E 's/netwatch-//; s/\.tar\.gz$//; s/-/_/g')
            echo "sha_${key}=${hash}" >> $GITHUB_OUTPUT
          done

      - name: Check out homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: matthart1983/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Regenerate Formula
        env:
          VERSION: ${{ steps.sha.outputs.version }}
          SHA_MACOS_X86_64: ${{ steps.sha.outputs.sha_macos_x86_64 }}
          SHA_MACOS_AARCH64: ${{ steps.sha.outputs.sha_macos_aarch64 }}
          SHA_LINUX_X86_64: ${{ steps.sha.outputs.sha_linux_x86_64_static }}
          SHA_LINUX_AARCH64: ${{ steps.sha.outputs.sha_linux_aarch64_static }}
        run: |
          cat > homebrew-tap/Formula/netwatch.rb <<EOF
          class Netwatch < Formula
            desc "Real-time network diagnostics in your terminal — zero config, instant visibility"
            homepage "https://github.com/matthart1983/netwatch"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/matthart1983/netwatch/releases/download/v${VERSION}/netwatch-macos-aarch64.tar.gz"
                sha256 "${SHA_MACOS_AARCH64}"

                def install
                  bin.install "netwatch-macos-aarch64" => "netwatch"
                end
              end
              on_intel do
                url "https://github.com/matthart1983/netwatch/releases/download/v${VERSION}/netwatch-macos-x86_64.tar.gz"
                sha256 "${SHA_MACOS_X86_64}"

                def install
                  bin.install "netwatch-macos-x86_64" => "netwatch"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/matthart1983/netwatch/releases/download/v${VERSION}/netwatch-linux-aarch64-static.tar.gz"
                sha256 "${SHA_LINUX_AARCH64}"

                def install
                  bin.install "netwatch-linux-aarch64-static" => "netwatch"
                end
              end
              on_intel do
                url "https://github.com/matthart1983/netwatch/releases/download/v${VERSION}/netwatch-linux-x86_64-static.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"

                def install
                  bin.install "netwatch-linux-x86_64-static" => "netwatch"
                end
              end
            end

            test do
              assert_match "netwatch", shell_output("#{bin}/netwatch --help 2>&1", 1)
            end
          end
          EOF

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/netwatch.rb; then
            echo "Formula already up to date"; exit 0
          fi
          git add Formula/netwatch.rb
          git commit -m "netwatch ${{ steps.sha.outputs.version }}: auto-update formula"
          git push origin main
